name: Build Robolark Embedded Studio V3 EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract SDCC ZIP
        run: |
          if (Test-Path "sdcc.zip") {
            powershell -Command "Expand-Archive sdcc.zip -DestinationPath . -Force"
          } else {
            echo "sdcc.zip not found. Make sure sdcc.zip exists in repo root."
            exit 1
          }

      - name: Verify SDCC Folder
        run: |
          dir
          dir sdcc
          dir sdcc\bin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyserial

      - name: Build Windows EXE
        run: |
          pyinstaller --onefile --windowed --name "Robolark_Embedded_Studio_V3" --add-data "sdcc;sdcc" app.py

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: Robolark_Embedded_Studio_V3_EXE
          path: dist/Robolark_Embedded_Studio_V3.exe
