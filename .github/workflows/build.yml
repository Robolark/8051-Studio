name: Build Robolark Simple Upload IDE V4

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract SDCC ZIP
        run: |
          if (Test-Path "sdcc.zip") {
            powershell -Command "Expand-Archive sdcc.zip -DestinationPath . -Force"
          } else {
            echo "sdcc.zip not found"
            exit 1
          }

      - name: Verify SDCC
        run: |
          dir sdcc
          dir sdcc\bin

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pyinstaller pyserial

      - name: Build EXE
        run: |
          pyinstaller --onefile --windowed --name "Robolark_Simple_Upload_IDE" --add-data "sdcc;sdcc" app.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Robolark_Simple_Upload_IDE_EXE
          path: dist/Robolark_Simple_Upload_IDE.exe
